# Spring Boot Configuration
spring:
  application:
    name: szbzApi

  # Database Configuration - SQLite
  datasource:
    url: jdbc:sqlite:/app/data/szbz.db
    # url: jdbc:sqlite:/Users/wang/Documents/cursor_demo/szbz/szbz/data/db/szbz.db
    driver-class-name: org.sqlite.JDBC

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # SQLite driver compatibility settings
        jdbc:
          use_get_generated_keys: false
          get_generated_keys: false
          batch_size: 0
        temp:
          use_jdbc_metadata_defaults: false
        # Disable Hibernate sequences for SQLite
        use_legacy_limit_handler: true
        id:
          new_generator_mappings: false
          generator:
            optimizer: none
        schema_update:
          auto_create_foreign_keys: false

  # Email Configuration - 163 Mail
  mail:
    host: smtp.163.com
    port: 465
    username: txw250@163.com
    password: ACasgm4Dk3Pw7YpH
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true

# Server Configuration
server:
